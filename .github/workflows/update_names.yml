name: 사명 변경 자동 업데이트

on:
  schedule:
    - cron: '0 1 * * 1'
  push:
    paths:
      - '*.xlsx'
      - 'update_stock_names.py'
      - 'stock_code_map.json'
      - 'name_aliases.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stock-names:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: |
          pip install --quiet pandas openpyxl finance-datareader requests

      - name: 매일 업로드 파일 종목코드 자동 입력
        if: github.event_name == 'push'
        run: python update_stock_names.py --fill-codes-only --target-file "종목정리_종목순 정렬.xlsx"

      - name: 주간 전체 사명 변경 점검
        if: github.event_name != 'push'
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        run: python update_stock_names.py

      - name: 변경 사항 확인
        id: check_changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "변경 사항 없음 — 커밋 스킵"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "변경 사항 있음 — 커밋 진행"
          fi

      - name: 변경된 파일 커밋 & 푸시
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add *.xlsx stock_code_map.json name_aliases.json
          git commit -m "자동 업데이트: 사명 변경 반영 $(date +'%Y-%m-%d')"
          git push
